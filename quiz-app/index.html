<!DOCTYPE html>
<html>
<head>
<title>Quiz</title>
<style>
body { font-family:Arial; text-align:center; }
button { margin:5px; padding:10px; }
</style>
</head>

<body>

<h2 id="question"></h2>
<div id="options"></div>
<button onclick="next()">Next</button>

<script>
let qIndex=0, score=0;

const questions=[
  {q:"HTML stands for?", o:["Hyper Text Markup Language","Home Tool"], a:0},
  {q:"CSS used for?", o:["Styling","Programming"], a:0},
  {q:"JS is?", o:["Language","Database"], a:0}
];

function load(){
  let q=questions[qIndex];
  question.innerText=q.q;
  options.innerHTML="";
  q.o.forEach((opt,i)=>{
    let btn=document.createElement("button");
    btn.innerText=opt;
    btn.onclick=()=>{ if(i===q.a) score++; };
    options.appendChild(btn);
  });
}

function next(){
  qIndex++;
  if(qIndex<questions.length) load();
  else alert("Score: "+score);
}

load();
</script>

</body>
</html>
